server {
    listen 80;
    listen [::]:80;
    server_name meet.onclik2buy.com;

    set $forward_scheme "http";
    set $server "127.0.0.1";
    set $port "8083";

    access_log /data/logs/proxy_host-6.log proxy;
    error_log /data/logs/proxy_host-6.log warn;

    include conf.d/include/assets.conf;
    include conf.d/include/block-exploits.conf;
    include conf.d/include/letsencrypt-acme-challenge.conf;

    location / {
        include conf.d/include/proxy.conf;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name meet.onclik2buy.com;

    ssl_certificate /etc/letsencrypt/live/meet.onclik2buy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meet.onclik2buy.com/privkey.pem;

    set $forward_scheme "http";
    set $server "127.0.0.1";
    set $port "8083";

    access_log /data/logs/proxy_host-6.log proxy;
    error_log /data/logs/proxy_host-6.log warn;

    include conf.d/include/assets.conf;
    include conf.d/include/block-exploits.conf;
    include conf.d/include/force-ssl.conf;

    location / {
        include conf.d/include/proxy.conf;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
